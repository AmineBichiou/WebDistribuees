spring:
  application:
    name: BOOKING
  config:
    import: "optional:configserver:http://localhost:8888"
  
  # Security OAuth2
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8089/realms/microservices-realm
          jwk-set-uri: http://localhost:8089/realms/microservices-realm/protocol/openid-connect/certs
  
  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

# Kafka Topics
kafka:
  topic:
    booking-events: booking-events
