server:
  port: 8090

spring:
  application:
    name: gateway

  # OAuth2 Security - Désactivé temporairement pour tests Kafka
  # security:
  #   oauth2:
  #     resourceserver:
  #       jwt:
  #         issuer-uri: http://localhost:8089/realms/microservices-realm

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/users/**
            - id: BOOKING
              uri: lb://BOOKING
              predicates:
                - Path=/api/bookings/**
            - id: EMPLOYEE
              uri: lb://employee-service
              predicates:
                - Path=/api/employees/**
            - id: room-service
              uri: lb://room-service
              predicates:
                - Path=/api/rooms/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true


